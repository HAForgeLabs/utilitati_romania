reload_all:
  name: Reîncarcă toate subintegrările
  description: Reîncarcă toate intrările furnizorilor configurate pentru Utilități România.

open_provider:
  name: Deschide furnizor
  description: Deschide aplicația sau portalul furnizorului pe dispozitivul mobil selectat în Administrare integrare.
  fields:
    provider:
      name: Furnizor
      description: Cheia internă a furnizorului, de exemplu digi, hidroelectrica, eon.
      required: true
      example: digi


submit_reading:
  name: Transmite index
  description: Transmite direct indexul către furnizor, fără a depinde de starea temporară a entității number.
  fields:
    provider:
      name: Furnizor
      description: Cheia internă a furnizorului. Momentan este acceptat apa_canal.
      required: true
      example: apa_canal
    entry_id:
      name: Intrare configurare
      description: ID-ul intrării de configurare, dacă este disponibil în card.
      required: false
    id_cont:
      name: Cont
      description: Identificatorul contului/locului de consum.
      required: false
    id_contract:
      name: Contract
      description: Identificatorul contractului.
      required: false
    value:
      name: Index
      description: Valoarea indexului de transmis.
      required: true
      example: 622

set_notification_preferences:
  name: Setează preferințele de notificare
  description: Salvează preferințele pentru notificările generate de Utilități România.
  fields:
    facturi_noi:
      name: Facturi noi
      description: Activează notificările pentru facturi noi neplătite.
      required: false
      example: true
    scadente:
      name: Scadențe
      description: Activează notificările pentru scadențe apropiate.
      required: false
      example: true
    indexuri:
      name: Indexuri
      description: Activează notificările pentru perioade de transmitere index.
      required: false
      example: true
    praguri_scadenta:
      name: Praguri scadență
      description: Lista zilelor înainte de scadență pentru care se generează notificări.
      required: false
      example: [5, 3, 1]
